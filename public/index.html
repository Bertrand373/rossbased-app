    <!-- THEME INITIALIZATION - Runs before React to prevent flash -->
    <script>
      (function() {
        // Read theme from localStorage (default to 'dark')
        var theme = localStorage.getItem('titantrack-theme') || 'dark';
        
        // Apply theme to <html> element immediately
        document.documentElement.setAttribute('data-theme', theme);
        
        // Update theme-color meta tag for browser chrome
        var themeColorMeta = document.getElementById('theme-color-meta');
        if (themeColorMeta) {
          themeColorMeta.setAttribute('content', theme === 'light' ? '#f4ede0' : '#000000');
        }
      })();
    </script>
    
    <style>
      /* Theme-aware background immediately */
      html, body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
      }
      
      /* Dark theme (default) */
      html {
        background-color: #000000;
        color: #ffffff;
      }
      
      /* Light theme — parchment */
      html[data-theme="light"] {
        background-color: #f4ede0;
        color: #3a2e1c;
      }
      
      /* Allow text selection in inputs */
      input, textarea, [contenteditable] {
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
        font-size: 16px !important;
      }
      
      /* =================================================================
         BROWSER MODE — flex centering inside a full-viewport container.
         This uses the VISIBLE viewport (inset:0 snaps to visible edges in
         iOS Safari), so the icon stays at true visual center even when
         the URL bar is showing. Always worked correctly; restored here.
         ================================================================= */
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: background-color 0.2s ease;
        background-color: #000000;
      }
      
      html:not([data-theme="light"]) #initial-loader {
        background-color: #000000;
      }
      
      html[data-theme="light"] #initial-loader {
        background-color: #f4ede0;
      }
      
      .loader-icon {
        width: 64px;
        height: 64px;
        opacity: 1;
        transform: translateZ(0);
        -webkit-transform: translateZ(0);
        animation: pulse 2s ease-in-out infinite;
      }
      
      @keyframes pulse {
        0%, 100% {
          opacity: 1;
          transform: translateZ(0) scale(1);
        }
        50% {
          opacity: 0.4;
          transform: translateZ(0) scale(0.95);
        }
      }
      
      /* =================================================================
         PWA STANDALONE MODE ONLY — pin the icon to an absolute pixel
         position per device so the iOS viewport-settle race cannot
         affect it. In standalone mode viewport == device, so these
         pinned values equal the true visual center of the screen.
         
         Not applied in browser mode (where viewport < device because
         of the URL bar) — browser uses the flex centering above.
         ================================================================= */
      @media (display-mode: standalone) {
        .loader-icon {
          position: fixed;
          top: 50%;
          left: 50%;
          margin-top: -32px;
          margin-left: -32px;
        }
      }
      
      /* Device-specific Y-coordinate overrides (PWA only) */
      @media (display-mode: standalone) and (device-height: 667px) and (orientation: portrait) {
        .loader-icon { top: 334px; }
      }
      @media (display-mode: standalone) and (device-height: 736px) and (orientation: portrait) {
        .loader-icon { top: 368px; }
      }
      @media (display-mode: standalone) and (device-height: 812px) and (orientation: portrait) {
        .loader-icon { top: 406px; }
      }
      @media (display-mode: standalone) and (device-height: 844px) and (orientation: portrait) {
        .loader-icon { top: 422px; }
      }
      @media (display-mode: standalone) and (device-height: 852px) and (orientation: portrait) {
        .loader-icon { top: 426px; }
      }
      @media (display-mode: standalone) and (device-height: 874px) and (orientation: portrait) {
        .loader-icon { top: 437px; }
      }
      @media (display-mode: standalone) and (device-height: 896px) and (orientation: portrait) {
        .loader-icon { top: 448px; }
      }
      @media (display-mode: standalone) and (device-height: 926px) and (orientation: portrait) {

      }

        .loader-icon { top: 683px; }

    <!-- Minimal loader - icon only, theme-aware -->
    <div id="initial-loader">
      <img class="loader-icon" id="loader-icon" src="%PUBLIC_URL%/icon-192.png" alt="" width="64" height="64" />
    </div>
    
    <!-- Theme-aware loader icon swap (runs synchronously right after <img> parses) -->
    <script>
      (function() {
        var theme = document.documentElement.getAttribute('data-theme') || 'dark';
        var loaderIcon = document.getElementById('loader-icon');
        if (loaderIcon && theme === 'light') {
          loaderIcon.src = '%PUBLIC_URL%/tt-icon-black.png';
          document.body.style.backgroundColor = '#f4ede0';
          var ldr = document.getElementById('initial-loader');
          if (ldr) ldr.style.backgroundColor = '#f4ede0';
        }
      })();
    </script>
    
    <div id="root"></div>
    
    <script>
      // Zoom prevention
      let lastTouchEnd = 0;
      
      document.addEventListener('touchstart', function(event) {
        if (event.touches.length > 1) {
          event.preventDefault();
        }
      }, { passive: false });
      
      document.addEventListener('touchmove', function(event) {
        if (event.touches.length > 1) {
          event.preventDefault();
        }
      }, { passive: false });
      
      document.addEventListener('touchend', function(event) {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, { passive: false });
      
      document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });
      document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });
      document.addEventListener('gestureend', function(e) { e.preventDefault(); }, { passive: false });
      
      document.addEventListener('keydown', function(event) {
        if ((event.ctrlKey || event.metaKey) && 
            (event.key === '+' || event.key === '-' || event.key === '0' || event.key === '=')) {
          event.preventDefault();
        }
      }, { passive: false });
      
      document.addEventListener('wheel', function(event) {
        if (event.ctrlKey || event.metaKey) {
          event.preventDefault();
        }
      }, { passive: false });
      
      // Loader removal is handled by React (App.js useEffect)
      // React fades out #initial-loader when app is fully ready
      // (auth complete, subscription resolved, data loaded)
    </script>
