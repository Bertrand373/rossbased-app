<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f0f0f" />
    <meta
      name="description"
      content="SR Tracker - Track your semen retention journey"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>SR Tracker</title>
    <style>
      /* Apply dark background immediately during loading */
      html, body {
        background-color: #0f0f0f;
        color: #f9fafb;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
      }
      
      /* Custom loader that shows while React loads */
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #0f0f0f;
        z-index: 9999;
      }
      
      #initial-loader .spinner {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(to right, #ffdd00, rgba(255, 221, 0, 0.3));
        display: flex;
        justify-content: center;
        align-items: center;
        animation: spin 1.5s linear infinite;
      }
      
      #initial-loader .spinner-inner {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: #0f0f0f;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <!-- Initial loader that shows while React loads -->
    <div id="initial-loader">
      <div class="spinner">
        <div class="spinner-inner"></div>
      </div>
    </div>
    
    <div id="root"></div>
    
    <script>
      // Remove the initial loader once the React app mounts
      window.onload = function() {
        setTimeout(function() {
          var loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.5s ease';
            setTimeout(function() {
              loader.style.display = 'none';
            }, 500);
          }
        }, 300);
      };
    </script>
  </body>
</html>
