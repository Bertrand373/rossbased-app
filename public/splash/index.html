    <!-- THEME INITIALIZATION - Runs before React to prevent flash -->
    <script>
      (function() {
        // Read theme from localStorage (default to 'dark')
        var theme = localStorage.getItem('titantrack-theme') || 'dark';
        
        // Apply theme to <html> element immediately
        document.documentElement.setAttribute('data-theme', theme);
        
        // Update theme-color meta tag for browser chrome
        var themeColorMeta = document.getElementById('theme-color-meta');
        if (themeColorMeta) {
          themeColorMeta.setAttribute('content', theme === 'light' ? '#ffffff' : '#000000');
        }
      })();
    </script>
    
    <style>
      /* Theme-aware background immediately */
      html, body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
      }
      
      /* Dark theme (default) */
      html {
        background-color: #000000;
        color: #ffffff;
      }
      
      /* Light theme */
      html[data-theme="light"] {
        background-color: #ffffff;
        color: #000000;
      }
      
      /* Allow text selection in inputs */
      input, textarea, [contenteditable] {
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
        font-size: 16px !important;
      }
      
      /* Full-viewport background for the loader.
         Icon is positioned absolutely (see .loader-icon below), so this
         container only provides the solid background color — no flex
         centering happens here. */
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        height: 100lvh;
        z-index: 9999;
        transition: background-color 0.2s ease;
        background-color: #000000;
      }
      
      html:not([data-theme="light"]) #initial-loader {
        background-color: #000000;
      }
      
      html[data-theme="light"] #initial-loader {
        background-color: #ffffff;
      }
      
      /* Icon uses position:fixed + device-pinned 'top' (see @media rules below)
         instead of flex or viewport-% centering. This eliminates the iOS
         viewport-settle race where '50% of current-viewport-height' briefly
         computes wrong during WebKit's first-paint settle window. A hardcoded
         pixel 'top' per device-height is stable from the first rendered
         frame because device-height in media queries reflects the hardware,
         not the runtime viewport — so it can't race. */
      .loader-icon {
        position: fixed;
        top: 50%;  /* generic fallback — used by devices not in the @media list */
        left: 50%;
        width: 64px;
        height: 64px;
        opacity: 1;
        transform: translate(-50%, -50%) translateZ(0);
        -webkit-transform: translate(-50%, -50%) translateZ(0);
        animation: pulse 2s ease-in-out infinite;
      }
      
      /* Pulse animation preserves the centering transform so scale() doesn't
         knock the icon off-center. */
      @keyframes pulse {
        0%, 100% {
          opacity: 1;
          transform: translate(-50%, -50%) translateZ(0) scale(1);
        }
        50% {
          opacity: 0.4;
          transform: translate(-50%, -50%) translateZ(0) scale(0.95);
        }
      }
      
      /* =================================================================
         DEVICE-PINNED ICON POSITIONS
         
         Each rule pins the icon's Y-coordinate to exactly 50% of that
         device's hardware height. Values match the icon center of the
         corresponding apple-touch-startup-image splash, so splash → HTML
         transition is pixel-identical on every supported device.
         ================================================================= */
      
      /* iPhone SE/6/7/8 — 375×667 */
      @media (device-height: 667px) and (orientation: portrait) {
        .loader-icon { top: 334px; }
      }
      /* iPhone 6+/7+/8+ — 414×736 */
      @media (device-height: 736px) and (orientation: portrait) {
        .loader-icon { top: 368px; }
      }
      /* iPhone X/XS/11 Pro/12 mini/13 mini — 375×812 */
      @media (device-height: 812px) and (orientation: portrait) {
        .loader-icon { top: 406px; }
      }
      /* iPhone 12/13/14 — 390×844 */
      @media (device-height: 844px) and (orientation: portrait) {
        .loader-icon { top: 422px; }
      }
      /* iPhone 14 Pro/15/15 Pro — 393×852 */
      @media (device-height: 852px) and (orientation: portrait) {
        .loader-icon { top: 426px; }
      }
      /* iPhone 16/16 Pro — 402×874 */
      @media (device-height: 874px) and (orientation: portrait) {
        .loader-icon { top: 437px; }
      }
      /* iPhone XR/11/XS Max/11 Pro Max — 414×896 */
      @media (device-height: 896px) and (orientation: portrait) {
        .loader-icon { top: 448px; }
      }
      /* iPhone 12/13 Pro Max, 14 Plus — 428×926 */
      @media (device-height: 926px) and (orientation: portrait) {
        .loader-icon { top: 463px; }
      }
      /* iPhone 14 Pro Max/15 Plus/15 Pro Max — 430×932 */
      @media (device-height: 932px) and (orientation: portrait) {
        .loader-icon { top: 466px; }
      }
      /* iPhone 16 Plus/16 Pro Max — 440×956 */

        .loader-icon { top: 478px; }
      }
      /* iPad 9.7/Mini — 768×1024 */
      @media (device-height: 1024px) and (orientation: portrait) {
        .loader-icon { top: 512px; }
      }
      /* iPad 10.2 — 810×1080 */
      @media (device-height: 1080px) and (orientation: portrait) {
        .loader-icon { top: 540px; }
      }

      }

    <!-- Minimal loader - icon only, theme-aware -->
    <div id="initial-loader">
      <img class="loader-icon" id="loader-icon" src="%PUBLIC_URL%/icon-192.png" alt="" width="64" height="64" />
    </div>
    
    <!-- Theme-aware loader icon swap (runs synchronously right after <img> parses) -->
    <script>
      (function() {
        var theme = document.documentElement.getAttribute('data-theme') || 'dark';
        var loaderIcon = document.getElementById('loader-icon');
        if (loaderIcon && theme === 'light') {
          loaderIcon.src = '%PUBLIC_URL%/icon-192-black.png';
          document.body.style.backgroundColor = '#ffffff';
          var ldr = document.getElementById('initial-loader');
          if (ldr) ldr.style.backgroundColor = '#ffffff';
        }
      })();
    </script>
    
    <div id="root"></div>
    
    <script>
      // Zoom prevention
      let lastTouchEnd = 0;
      
      document.addEventListener('touchstart', function(event) {
        if (event.touches.length > 1) {
          event.preventDefault();
        }
      }, { passive: false });
      
      document.addEventListener('touchmove', function(event) {
        if (event.touches.length > 1) {
          event.preventDefault();
        }
      }, { passive: false });
      
      document.addEventListener('touchend', function(event) {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, { passive: false });
      
      document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });
      document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });
      document.addEventListener('gestureend', function(e) { e.preventDefault(); }, { passive: false });
      
      document.addEventListener('keydown', function(event) {
        if ((event.ctrlKey || event.metaKey) && 
            (event.key === '+' || event.key === '-' || event.key === '0' || event.key === '=')) {
          event.preventDefault();
        }
      }, { passive: false });
      
      document.addEventListener('wheel', function(event) {
        if (event.ctrlKey || event.metaKey) {
          event.preventDefault();
        }
      }, { passive: false });
      
      // Loader removal is handled by React (App.js useEffect)
      // React fades out #initial-loader when app is fully ready
      // (auth complete, subscription resolved, data loaded)
    </script>
